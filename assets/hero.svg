<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5ca8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff5ca8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39d0d8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#39d0d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffd76a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05060e" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <!-- space -->
  <rect width="1200" height="630" fill="#05060e"/>

  <!-- galaxies -->
  <circle cx="300" cy="205" r="250" fill="url(#g1)"/>
  <circle cx="905" cy="165" r="250" fill="url(#g2)"/>
  <circle cx="720" cy="500" r="250" fill="url(#g3)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="70" cy="60" r="1.4" opacity="0.7"/><circle cx="150" cy="120" r="1" opacity="0.5"/>
    <circle cx="230" cy="40" r="1.2" opacity="0.6"/><circle cx="360" cy="90" r="1" opacity="0.4"/>
    <circle cx="470" cy="55" r="1.5" opacity="0.8"/><circle cx="560" cy="120" r="1" opacity="0.5"/>
    <circle cx="650" cy="60" r="1.2" opacity="0.6"/><circle cx="760" cy="40" r="1" opacity="0.4"/>
    <circle cx="880" cy="70" r="1.4" opacity="0.7"/><circle cx="980" cy="120" r="1" opacity="0.5"/>
    <circle cx="1080" cy="60" r="1.3" opacity="0.6"/><circle cx="1140" cy="130" r="1" opacity="0.4"/>
    <circle cx="40" cy="220" r="1" opacity="0.5"/><circle cx="120" cy="300" r="1.3" opacity="0.6"/>
    <circle cx="200" cy="380" r="1" opacity="0.4"/><circle cx="60" cy="460" r="1.4" opacity="0.7"/>
    <circle cx="180" cy="520" r="1" opacity="0.5"/><circle cx="100" cy="580" r="1.2" opacity="0.6"/>
    <circle cx="1150" cy="240" r="1.3" opacity="0.6"/><circle cx="1090" cy="320" r="1" opacity="0.4"/>
    <circle cx="1160" cy="400" r="1.4" opacity="0.7"/><circle cx="1110" cy="470" r="1" opacity="0.5"/>
    <circle cx="1050" cy="560" r="1.2" opacity="0.6"/><circle cx="1175" cy="540" r="1" opacity="0.4"/>
    <circle cx="420" cy="300" r="1" opacity="0.4"/><circle cx="500" cy="420" r="1.2" opacity="0.5"/>
    <circle cx="610" cy="250" r="1" opacity="0.4"/><circle cx="820" cy="320" r="1.1" opacity="0.5"/>
    <circle cx="960" cy="430" r="1" opacity="0.4"/><circle cx="380" cy="470" r="1.2" opacity="0.5"/>
    <circle cx="300" cy="560" r="1" opacity="0.4"/><circle cx="690" cy="190" r="1" opacity="0.4"/>
  </g>

  <!-- lineage lines (ideas descending across brains) -->
  <g stroke="#9db0ff" fill="none" stroke-opacity="0.22" stroke-width="1.2">
    <path d="M300,205 Q430,280 545,330"/>
    <path d="M545,330 Q640,410 720,480"/>
    <path d="M905,165 Q740,240 545,330"/>
    <path d="M905,165 Q1010,290 1050,410"/>
    <path d="M300,205 Q540,150 905,165"/>
  </g>

  <!-- solar systems: gold star + orbits + planets -->
  <!-- S1 -->
  <g>
    <circle cx="300" cy="205" r="34" fill="url(#star)"/>
    <ellipse cx="300" cy="205" rx="26" ry="26" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <ellipse cx="300" cy="205" rx="46" ry="46" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    <circle cx="300" cy="205" r="6" fill="#ffd76a"/>
    <circle cx="326" cy="205" r="3.5" fill="#7c5cff"/>
    <circle cx="266" cy="220" r="3" fill="#7c5cff"/>
  </g>
  <!-- S2 -->
  <g>
    <circle cx="905" cy="165" r="34" fill="url(#star)"/>
    <ellipse cx="905" cy="165" rx="28" ry="28" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <ellipse cx="905" cy="165" rx="48" ry="48" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    <circle cx="905" cy="165" r="6" fill="#ffd76a"/>
    <circle cx="933" cy="165" r="3.5" fill="#ff5ca8"/>
    <circle cx="869" cy="150" r="3" fill="#ff5ca8"/>
  </g>
  <!-- S3 -->
  <g>
    <circle cx="720" cy="480" r="34" fill="url(#star)"/>
    <ellipse cx="720" cy="480" rx="26" ry="26" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <ellipse cx="720" cy="480" rx="44" ry="44" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    <circle cx="720" cy="480" r="6" fill="#ffd76a"/>
    <circle cx="746" cy="480" r="3.5" fill="#39d0d8"/>
    <circle cx="690" cy="495" r="3" fill="#39d0d8"/>
  </g>
  <!-- S4 (center, mixed) -->
  <g>
    <circle cx="545" cy="330" r="30" fill="url(#star)"/>
    <ellipse cx="545" cy="330" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <ellipse cx="545" cy="330" rx="40" ry="40" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    <circle cx="545" cy="330" r="5" fill="#ffd76a"/>
    <circle cx="567" cy="330" r="3" fill="#9db0ff"/>
    <circle cx="515" cy="342" r="3" fill="#9db0ff"/>
  </g>
  <!-- S5 -->
  <g>
    <circle cx="1050" cy="410" r="28" fill="url(#star)"/>
    <ellipse cx="1050" cy="410" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="1050" cy="410" r="5" fill="#ffd76a"/>
    <circle cx="1072" cy="410" r="3" fill="#ff5ca8"/>
  </g>

  <!-- legibility fade for title -->
  <rect x="0" y="430" width="1200" height="200" fill="url(#fade)"/>

  <!-- title -->
  <text x="70" y="500" fill="#7c5cff" font-size="17" letter-spacing="3" font-weight="600">OPEN SOURCE · SELF-HOSTABLE · ZERO TELEMETRY</text>
  <text x="68" y="558" fill="#e8ecff" font-size="64" font-weight="800" letter-spacing="1">🧠 Domvault</text>
  <text x="72" y="596" fill="#8b93c0" font-size="23">A universe of brains — own your stack · share by consent · credit by default</text>
</svg>
