<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Constellation — the universe of brains</title>
<style>
  :root { --bg:#05060e; --fg:#e8ecff; --muted:#8b93c0; --panel:#0d1126; --line:#2a3260; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden;
    -webkit-text-size-adjust:100%; }
  #hud { position:fixed; top:14px; left:16px; right:16px; z-index:10; max-width:340px; pointer-events:none; }
  #hud h1 { font-size:18px; margin:0 0 4px; letter-spacing:.3px; }
  #hud p { margin:0; color:var(--muted); font-size:12px; }
  #crumbs { margin-top:10px; font-size:12px; pointer-events:auto; }
  #crumbs a { color:#9db0ff; cursor:pointer; text-decoration:none; padding:2px 0; display:inline-block; }
  #crumbs a:hover { text-decoration:underline; }
  #tip { position:fixed; z-index:20; padding:7px 10px; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; font-size:12px; pointer-events:none; opacity:0; transition:opacity .1s;
    max-width:min(260px,72vw); }
  #tip .tt { font-weight:600; color:var(--fg); }
  #tip .ts { margin-top:3px; color:var(--muted); font-size:11px; line-height:1.35; }
  #legend { position:fixed; bottom:14px; left:16px; right:16px; color:var(--muted); font-size:11px; z-index:10;
    max-width:62ch; pointer-events:none; }
  #legend b { color:var(--fg); font-weight:600; }
  #detail { position:fixed; right:16px; top:16px; z-index:30; max-width:320px; padding:14px 16px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px; font-size:12px; }
  #detailClose { position:absolute; top:8px; right:10px; background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:18px; line-height:1; padding:4px; }
  canvas { display:block; touch-action:none; }
  /* Phones: stack cleanly — HUD spans the top, the detail card becomes a bottom sheet so it
     never overlaps the HUD or runs off-screen, and the legend stays short above it. */
  @media (max-width:600px){
    #hud { top:10px; left:12px; right:12px; max-width:none; }
    #hud h1 { font-size:16px; }
    #hud p { font-size:11px; }
    #detail { left:8px; right:8px; top:auto; bottom:0; max-width:none; max-height:55vh; overflow:auto;
      border-radius:14px 14px 0 0; padding:16px; }
    #detailClose { font-size:24px; padding:6px; }
    #legend { bottom:10px; left:12px; right:12px; font-size:10px; }
  }
</style>
</head>
<body>
<div id="hud">
  <h1>🌌 Constellation</h1>
  <p>A universe of <b>galaxies</b> (topics) → <b>solar systems</b> (brains) → <b>planets</b> (published notes). Scroll/click to zoom in, click empty space or a crumb to zoom out.</p>
  <div id="crumbs"></div>
</div>
<div id="legend">Each ☀️ is one person's brain. A 🪐 only appears if its owner <b>opted in</b> to publish it. <span id="source">connecting…</span></div>
<div id="tip"></div>
<div id="detail" style="display:none;">
  <button id="detailClose" aria-label="Close">×</button>
  <div id="detailBody"></div>
</div>
<canvas id="c"></canvas>
<script type="module">
import { mapUniverseToData, GALAXY_CATALOG } from './map.js';
import { DEFAULT_REGISTRY } from './registry.config.js';
// Registry base URL: ?registry=<url> overrides the configured default (set DEFAULT_REGISTRY
// to your hosted HTTPS URL after deploy). Falls back to the offline mock if unreachable.
const REGISTRY = new URLSearchParams(location.search).get('registry') || DEFAULT_REGISTRY;
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const tip = document.getElementById('tip'), crumbs = document.getElementById('crumbs');
const detail = document.getElementById('detail'), detailBody = document.getElementById('detailBody');
const sourceEl = document.getElementById('source');
document.getElementById('detailClose').onclick = () => { detail.style.display = 'none'; };
// UI: scale dots/labels up on small screens so planets stay legible; PAD: enlarge tap targets on touch.
const TOUCH = matchMedia('(pointer:coarse)').matches;
let W,H,DPR,UI=1; const PAD = TOUCH ? 1.9 : 1;
function resize(){ DPR=devicePixelRatio||1; W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  UI = Math.min(innerWidth,innerHeight) < 600 ? 1.7 : 1; }
addEventListener('resize', resize); resize();

let DATA={galaxies:[]};
let view = {mode:'universe', galaxy:null, star:null}; // universe | galaxy | star
let t=0, hot=null;

// deterministic layout positions
function layout(){
  const cx=W/2, cy=H/2;
  // Elliptical ring (separate X/Y radii) so galaxies spread into the taller axis on portrait phones
  // instead of bunching in a tight circle where their labels collide.
  const Rx = W*0.34, Ry = H*0.32;
  DATA.galaxies.forEach((g,i)=>{
    const a = (i/DATA.galaxies.length)*Math.PI*2 - Math.PI/2;
    g.x = cx + Math.cos(a)*Rx; g.y = cy + Math.sin(a)*Ry;
    g.stars.forEach((s,j)=>{
      const sa=(j/g.stars.length)*Math.PI*2;
      const sr=Math.min(W,H)*0.16;
      s.x = g.x + Math.cos(sa)*sr; s.y = g.y + Math.sin(sa)*sr; s.gal=g;
      s.planets.forEach((p,k)=>{ if(typeof p==='string') s.planets[k]={name:p}; });
    });
  });
}

function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }

function draw(){
  t+=0.006; ctx.clearRect(0,0,W,H);
  // starfield
  ctx.fillStyle='#0a0d1e'; for(let i=0;i<140;i++){ const x=(i*73%W), y=(i*131%H);
    ctx.globalAlpha=0.3+0.3*Math.sin(t+i); ctx.fillRect(x,y,DPR,DPR); } ctx.globalAlpha=1;

  if(view.mode==='universe'){
    DATA.galaxies.forEach(g=>{
      // galaxy glow
      const grad=ctx.createRadialGradient(g.x,g.y,4,g.x,g.y,90*DPR);
      grad.addColorStop(0,g.color); grad.addColorStop(1,'transparent');
      ctx.globalAlpha=hot===g?0.5:0.32; ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(g.x,g.y,90*DPR,0,7); ctx.fill(); ctx.globalAlpha=1;
      // mini stars
      g.stars.forEach((s,j)=>{ const a=t*0.5+j; const r=40*DPR;
        ctx.fillStyle='#fff'; ctx.globalAlpha=0.8;
        ctx.beginPath(); ctx.arc(g.x+Math.cos(a)*r,g.y+Math.sin(a)*r,2.5*DPR*UI,0,7); ctx.fill(); });
      // Galaxy labels are already large; scale them only gently (TS) so they don't collide on mobile.
      const TS=Math.min(UI,1.2);
      ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font=`${13*DPR*TS}px sans-serif`; ctx.textAlign='center';
      ctx.fillText(g.name, g.x, g.y+72*DPR*TS);
      ctx.fillStyle=g.color; ctx.font=`${10*DPR*TS}px sans-serif`;
      ctx.fillText(g.stars.length+' brains', g.x, g.y+88*DPR*TS);
    });
  } else if(view.mode==='galaxy'){
    const g=view.galaxy;
    ctx.fillStyle=g.color; ctx.globalAlpha=0.10; ctx.beginPath(); ctx.arc(g.x,g.y,Math.min(W,H)*0.30,0,7); ctx.fill(); ctx.globalAlpha=1;
    g.stars.forEach(s=>{
      const gr=ctx.createRadialGradient(s.x,s.y,2,s.x,s.y,26*DPR);
      gr.addColorStop(0,'#fff7d6'); gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(s.x,s.y,26*DPR,0,7); ctx.fill();
      ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.arc(s.x,s.y,(hot===s?8:6)*DPR*UI,0,7); ctx.fill();
      // orbiting planet dots
      s.planets.forEach((p,k)=>{ const a=t*(0.6+k*0.12)+k; const r=(18+k*8)*DPR*UI;
        ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.beginPath(); ctx.arc(s.x,s.y,r,0,7); ctx.stroke();
        ctx.fillStyle=g.color; ctx.beginPath(); ctx.arc(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r,3*DPR*UI,0,7); ctx.fill(); });
      ctx.fillStyle='#fff'; ctx.font=`${12*DPR*UI}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('☀️ '+s.display, s.x, s.y+44*DPR*UI);
      ctx.fillStyle=var_muted(); ctx.font=`${10*DPR*UI}px sans-serif`;
      ctx.fillText(s.planets.length+' planets', s.x, s.y+60*DPR*UI);
    });
  } else if(view.mode==='star'){
    const s=view.star, g=s.gal; const cx=W/2, cy=H/2;
    const gr=ctx.createRadialGradient(cx,cy,4,cx,cy,46*DPR);
    gr.addColorStop(0,'#fff7d6'); gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx,cy,46*DPR,0,7); ctx.fill();
    ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.arc(cx,cy,13*DPR*UI,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`${14*DPR*UI}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('☀️ '+s.display+"'s brain", cx, cy-64*DPR*UI);
    // Spread orbits to fill the viewport (instead of fixed 70+34k px) so planets never bunch up on small screens.
    const n=s.planets.length, baseR=Math.min(W,H)*0.16, maxR=Math.min(W,H)*0.40;
    const step = n>1 ? (maxR-baseR)/(n-1) : 0;
    s.planets.forEach((p,k)=>{
      const a=t*(0.5+k*0.08)+k*1.3; const r=baseR + k*step;
      ctx.strokeStyle='rgba(255,255,255,.07)'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
      const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
      p._x=px; p._y=py;
      ctx.fillStyle=g.color; ctx.beginPath(); ctx.arc(px,py,(hot===p?9:6)*DPR*UI,0,7); ctx.fill();
      ctx.fillStyle='#cdd4ff'; ctx.font=`${11*DPR*UI}px sans-serif`;
      // Truncate long titles + align away from the edges so labels never run off-screen (full title is in the tooltip/detail).
      const label='🪐 '+(p.name.length>26 ? p.name.slice(0,25).trimEnd()+'…' : p.name);
      ctx.textAlign = px < W*0.30 ? 'left' : px > W*0.70 ? 'right' : 'center';
      ctx.fillText(label, px, py-14*DPR*UI);
      ctx.textAlign='center';
    });
  }
  requestAnimationFrame(draw);
}
function var_muted(){ return '#8b93c0'; }

// hit testing
function pick(mx,my){
  mx*=DPR; my*=DPR; hot=null;
  if(view.mode==='universe'){ for(const g of DATA.galaxies) if(dist(mx,my,g.x,g.y)<90*DPR){hot=g;return {type:'galaxy',o:g};} }
  else if(view.mode==='galaxy'){ for(const s of view.galaxy.stars) if(dist(mx,my,s.x,s.y)<34*DPR*PAD){hot=s;return {type:'star',o:s};} }
  else if(view.mode==='star'){ for(const p of view.star.planets) if(p._x&&dist(mx,my,p._x,p._y)<16*DPR*PAD*UI){hot=p;return {type:'planet',o:p};} }
  return null;
}
// A galaxy id → its human label (shared catalog; falls back to a title-cased id).
function galaxyName(id){ return GALAXY_CATALOG[id]?.name || String(id).replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
// Tooltip body: a bold title plus a one-line excerpt explaining WHAT the thing is.
function tipHTML(hit){
  const o=hit.o;
  if(hit.type==='galaxy'){ const n=o.stars.length;
    return `<div class="tt">✨ ${esc(o.name)}</div><div class="ts">Topic galaxy — ${n} ${n===1?'brain':'brains'} publishing ideas here. Tap to zoom in.</div>`; }
  if(hit.type==='star'){ const n=o.planets.length;
    return `<div class="tt">☀️ ${esc(o.display)}</div><div class="ts">A person's published second brain — ${n} ${n===1?'note':'notes'} shared. Tap to open it.</div>`; }
  const m=o.manifest||{};
  const gals=(m.galaxy||[]).map(galaxyName).join(', ');
  const author=m.author?.display||m.author?.handle||'';
  const lineage=m.origin?' · 🌙 forked from another idea':'';
  const sub=`Published note${gals?` in ${esc(gals)}`:''}${author?` · by ${esc(author)}`:''}${lineage} — tap for provenance & signature.`;
  return `<div class="tt">🪐 ${esc(o.name)}</div><div class="ts">${sub}</div>`;
}
// Show the tip near (x,y) but always clamped inside the viewport.
function placeTip(x,y){ const tw=tip.offsetWidth||200, th=tip.offsetHeight||44;
  tip.style.left=Math.min(Math.max(8,x+14), innerWidth-tw-8)+'px';
  tip.style.top=Math.min(Math.max(8,y+14), innerHeight-th-8)+'px'; }
cv.addEventListener('mousemove',e=>{
  const hit=pick(e.clientX,e.clientY);
  cv.style.cursor = hit ? 'pointer':'default';
  if(hit){ tip.innerHTML=tipHTML(hit); tip.style.opacity=1; placeTip(e.clientX,e.clientY); }
  else tip.style.opacity=0;
});
// Touch has no hover, so let a finger drag highlight + preview elements before lifting to select.
cv.addEventListener('touchmove',e=>{
  const tch=e.touches[0]; if(!tch) return;
  const hit=pick(tch.clientX,tch.clientY);
  if(hit){ tip.innerHTML=tipHTML(hit); tip.style.opacity=1;
    const tw=tip.offsetWidth||200, th=tip.offsetHeight||44;
    tip.style.left=Math.min(Math.max(8,tch.clientX-tw/2), innerWidth-tw-8)+'px';
    tip.style.top=Math.max(8, tch.clientY-th-18)+'px';
  } else tip.style.opacity=0;
}, {passive:true});
cv.addEventListener('touchend',()=>{ setTimeout(()=>{ tip.style.opacity=0; }, 900); }, {passive:true});
cv.addEventListener('click',e=>{
  const hit=pick(e.clientX,e.clientY);
  if(!hit){ // zoom out one level
    if(view.mode==='star'){ view={mode:'galaxy',galaxy:view.star.gal}; }
    else if(view.mode==='galaxy'){ view={mode:'universe'}; }
  } else if(hit.type==='galaxy'){ view={mode:'galaxy',galaxy:hit.o}; }
  else if(hit.type==='star'){ view={mode:'star',star:hit.o}; }
  else if(hit.type==='planet'){ showPlanet(hit.o); }
  renderCrumbs();
});

// Clicking a planet shows its manifest: title, author, license, lineage/origin, version.
function showPlanet(p){
  const m = p.manifest;
  if(!m){ detailBody.innerHTML = '<b>🪐 '+esc(p.name)+'</b>'; detail.style.display='block'; return; }
  const lineage = m.origin ? ('🌙 moon of <code>'+esc(m.origin)+'</code>') : 'origin planet (no fork)';
  const price = m.price ? (m.price.amount+' '+(m.price.currency||'')+' → grants '+esc(m.price.grants_license||'')) : 'free';
  detailBody.innerHTML =
    '<div style="font-size:13px;font-weight:600;margin:0 18px 8px 0;">🪐 '+esc(m.title)+'</div>'+
    row('author', '☀️ '+esc(m.author?.display||m.author?.handle||'—')+' <span style="color:#8b93c0">('+esc(m.author?.star||'')+')</span>')+
    row('license', esc(m.license||'—'))+
    row('lineage', lineage)+
    row('version', 'v'+esc(String(m.version??1))+' · '+esc((m.published_at||'').slice(0,10)))+
    row('galaxy', (m.galaxy||[]).map(esc).join(', ')||'—')+
    row('price', price)+
    row('id', '<code style="font-size:10px">'+esc(m.id||'')+'</code>')+
    (m.signature ? '<div style="margin-top:8px;color:#5cd6a8;font-size:11px;">✓ signed manifest (authorship provable)</div>' : '');
  detail.style.display='block';
}
function row(k,v){ return '<div style="margin:3px 0;"><span style="color:#8b93c0;display:inline-block;width:58px;">'+k+'</span>'+v+'</div>'; }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function renderCrumbs(){
  let html='<a data-l="universe">🌌 Universe</a>';
  if(view.mode==='galaxy'||view.mode==='star'){ const g=view.galaxy||view.star.gal; html+=' › <a data-l="galaxy">✨ '+g.name+'</a>'; }
  if(view.mode==='star'){ html+=' › <span>☀️ '+view.star.display+'</span>'; }
  crumbs.innerHTML=html;
  crumbs.querySelectorAll('a').forEach(a=>a.onclick=()=>{
    if(a.dataset.l==='universe') view={mode:'universe'};
    else if(a.dataset.l==='galaxy') view={mode:'galaxy',galaxy:(view.galaxy||view.star.gal)};
    renderCrumbs();
  });
}

// LIVE-first load: try the registry's /universe; if it's down/unreachable, DEGRADE to
// the offline mock (constellation/mock/data.json); last resort, an inline note.
// (Invariant: the Explorer always renders — it never hard-depends on the registry.)
function start(data, source){ DATA=data; sourceEl.textContent=source; layout(); renderCrumbs(); draw(); }

fetch(REGISTRY.replace(/\/+$/,'')+'/universe')
  .then(r=>{ if(!r.ok) throw new Error('registry '+r.status); return r.json(); })
  .then(u=>{
    const data = mapUniverseToData(u.planets||[]);
    if(!data.galaxies.length) throw new Error('registry empty');
    const planetCount=(u.planets||[]).length;
    start(data, '🟢 Live — '+planetCount+' planets from '+REGISTRY);
  })
  .catch(()=> fetch('mock/data.json').then(r=>r.json())
    .then(d=> start(d, '🟡 Mock data (registry unreachable — start it with: npm run demo)'))
    .catch(()=> start(
      {galaxies:[{id:'demo',name:'Demo Galaxy',color:'#7c5cff',stars:[{handle:'you',display:'You',planets:['Open via a local server (npm run demo) to see real planets']}]}]},
      '⚪ Offline fallback'))
  );
addEventListener('resize',()=>{ layout(); });
</script>
</body>
</html>
