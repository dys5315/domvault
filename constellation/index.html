<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Constellation вҖ” the universe of brains</title>
<style>
  :root { --bg:#05060e; --fg:#e8ecff; --muted:#8b93c0; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #hud { position:fixed; top:14px; left:16px; z-index:10; max-width:340px; pointer-events:none; }
  #hud h1 { font-size:18px; margin:0 0 4px; letter-spacing:.3px; }
  #hud p { margin:0; color:var(--muted); font-size:12px; }
  #crumbs { margin-top:10px; font-size:12px; pointer-events:auto; }
  #crumbs a { color:#9db0ff; cursor:pointer; text-decoration:none; }
  #crumbs a:hover { text-decoration:underline; }
  #tip { position:fixed; z-index:20; padding:6px 9px; background:#0d1126; border:1px solid #2a3260;
    border-radius:8px; font-size:12px; pointer-events:none; opacity:0; transition:opacity .1s; white-space:nowrap; }
  #legend { position:fixed; bottom:14px; left:16px; color:var(--muted); font-size:11px; z-index:10; }
  #legend b { color:var(--fg); font-weight:600; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="hud">
  <h1>рҹҢҢ Constellation</h1>
  <p>A universe of <b>galaxies</b> (topics) вҶ’ <b>solar systems</b> (brains) вҶ’ <b>planets</b> (published notes). Scroll/click to zoom in, click empty space or a crumb to zoom out.</p>
  <div id="crumbs"></div>
</div>
<div id="legend">Each вҳҖпёҸ is one person's brain. A рҹӘҗ only appears if its owner <b>opted in</b> to publish it. Mock data.</div>
<div id="tip"></div>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const tip = document.getElementById('tip'), crumbs = document.getElementById('crumbs');
let W,H,DPR; function resize(){ DPR=devicePixelRatio||1; W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px'; }
addEventListener('resize', resize); resize();

let DATA={galaxies:[]};
let view = {mode:'universe', galaxy:null, star:null}; // universe | galaxy | star
let t=0, hot=null;

// deterministic layout positions
function layout(){
  const cx=W/2, cy=H/2;
  DATA.galaxies.forEach((g,i)=>{
    const a = (i/DATA.galaxies.length)*Math.PI*2;
    const R = Math.min(W,H)*0.27;
    g.x = cx + Math.cos(a)*R; g.y = cy + Math.sin(a)*R;
    g.stars.forEach((s,j)=>{
      const sa=(j/g.stars.length)*Math.PI*2;
      const sr=Math.min(W,H)*0.16;
      s.x = g.x + Math.cos(sa)*sr; s.y = g.y + Math.sin(sa)*sr; s.gal=g;
      s.planets.forEach((p,k)=>{ if(typeof p==='string') s.planets[k]={name:p}; });
    });
  });
}

function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }

function draw(){
  t+=0.006; ctx.clearRect(0,0,W,H);
  // starfield
  ctx.fillStyle='#0a0d1e'; for(let i=0;i<140;i++){ const x=(i*73%W), y=(i*131%H);
    ctx.globalAlpha=0.3+0.3*Math.sin(t+i); ctx.fillRect(x,y,DPR,DPR); } ctx.globalAlpha=1;

  if(view.mode==='universe'){
    DATA.galaxies.forEach(g=>{
      // galaxy glow
      const grad=ctx.createRadialGradient(g.x,g.y,4,g.x,g.y,90*DPR);
      grad.addColorStop(0,g.color); grad.addColorStop(1,'transparent');
      ctx.globalAlpha=hot===g?0.5:0.32; ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(g.x,g.y,90*DPR,0,7); ctx.fill(); ctx.globalAlpha=1;
      // mini stars
      g.stars.forEach((s,j)=>{ const a=t*0.5+j; const r=40*DPR;
        ctx.fillStyle='#fff'; ctx.globalAlpha=0.8;
        ctx.beginPath(); ctx.arc(g.x+Math.cos(a)*r,g.y+Math.sin(a)*r,2*DPR,0,7); ctx.fill(); });
      ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.font=`${13*DPR}px sans-serif`; ctx.textAlign='center';
      ctx.fillText(g.name, g.x, g.y+108*DPR);
      ctx.fillStyle=g.color; ctx.font=`${10*DPR}px sans-serif`;
      ctx.fillText(g.stars.length+' brains', g.x, g.y+124*DPR);
    });
  } else if(view.mode==='galaxy'){
    const g=view.galaxy;
    ctx.fillStyle=g.color; ctx.globalAlpha=0.10; ctx.beginPath(); ctx.arc(g.x,g.y,Math.min(W,H)*0.30,0,7); ctx.fill(); ctx.globalAlpha=1;
    g.stars.forEach(s=>{
      const gr=ctx.createRadialGradient(s.x,s.y,2,s.x,s.y,26*DPR);
      gr.addColorStop(0,'#fff7d6'); gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(s.x,s.y,26*DPR,0,7); ctx.fill();
      ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.arc(s.x,s.y,(hot===s?7:5)*DPR,0,7); ctx.fill();
      // orbiting planet dots
      s.planets.forEach((p,k)=>{ const a=t*(0.6+k*0.12)+k; const r=(16+k*7)*DPR;
        ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.beginPath(); ctx.arc(s.x,s.y,r,0,7); ctx.stroke();
        ctx.fillStyle=g.color; ctx.beginPath(); ctx.arc(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r,2.5*DPR,0,7); ctx.fill(); });
      ctx.fillStyle='#fff'; ctx.font=`${12*DPR}px sans-serif`; ctx.textAlign='center';
      ctx.fillText('вҳҖпёҸ '+s.display, s.x, s.y+40*DPR);
      ctx.fillStyle=var_muted(); ctx.font=`${10*DPR}px sans-serif`;
      ctx.fillText(s.planets.length+' planets', s.x, s.y+55*DPR);
    });
  } else if(view.mode==='star'){
    const s=view.star, g=s.gal; const cx=W/2, cy=H/2;
    const gr=ctx.createRadialGradient(cx,cy,4,cx,cy,46*DPR);
    gr.addColorStop(0,'#fff7d6'); gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx,cy,46*DPR,0,7); ctx.fill();
    ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.arc(cx,cy,12*DPR,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`${14*DPR}px sans-serif`; ctx.textAlign='center';
    ctx.fillText('вҳҖпёҸ '+s.display+"'s brain", cx, cy-60*DPR);
    s.planets.forEach((p,k)=>{
      const a=t*(0.5+k*0.08)+k*1.3; const r=(70+k*34)*DPR;
      ctx.strokeStyle='rgba(255,255,255,.07)'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke();
      const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
      p._x=px; p._y=py;
      ctx.fillStyle=g.color; ctx.beginPath(); ctx.arc(px,py,(hot===p?8:5)*DPR,0,7); ctx.fill();
      ctx.fillStyle='#cdd4ff'; ctx.font=`${11*DPR}px sans-serif`;
      ctx.fillText('рҹӘҗ '+p.name, px, py-12*DPR);
    });
  }
  requestAnimationFrame(draw);
}
function var_muted(){ return '#8b93c0'; }

// hit testing
function pick(mx,my){
  mx*=DPR; my*=DPR; hot=null;
  if(view.mode==='universe'){ for(const g of DATA.galaxies) if(dist(mx,my,g.x,g.y)<90*DPR){hot=g;return {type:'galaxy',o:g};} }
  else if(view.mode==='galaxy'){ for(const s of view.galaxy.stars) if(dist(mx,my,s.x,s.y)<30*DPR){hot=s;return {type:'star',o:s};} }
  else if(view.mode==='star'){ for(const p of view.star.planets) if(p._x&&dist(mx,my,p._x,p._y)<14*DPR){hot=p;return {type:'planet',o:p};} }
  return null;
}
cv.addEventListener('mousemove',e=>{
  const hit=pick(e.clientX,e.clientY);
  cv.style.cursor = hit ? 'pointer':'default';
  if(hit){ tip.style.opacity=1; tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY+12)+'px';
    tip.textContent = hit.type==='galaxy'? `вңЁ ${hit.o.name} вҖ” ${hit.o.stars.length} brains`
      : hit.type==='star'? `вҳҖпёҸ ${hit.o.display} вҖ” ${hit.o.planets.length} published planets`
      : `рҹӘҗ ${hit.o.name}`;
  } else tip.style.opacity=0;
});
cv.addEventListener('click',e=>{
  const hit=pick(e.clientX,e.clientY);
  if(!hit){ // zoom out one level
    if(view.mode==='star'){ view={mode:'galaxy',galaxy:view.star.gal}; }
    else if(view.mode==='galaxy'){ view={mode:'universe'}; }
  } else if(hit.type==='galaxy'){ view={mode:'galaxy',galaxy:hit.o}; }
  else if(hit.type==='star'){ view={mode:'star',star:hit.o}; }
  else if(hit.type==='planet'){ tip.textContent='рҹӘҗ '+hit.o.name+' (would open the note / pull dialog)'; }
  renderCrumbs();
});
function renderCrumbs(){
  let html='<a data-l="universe">рҹҢҢ Universe</a>';
  if(view.mode==='galaxy'||view.mode==='star'){ const g=view.galaxy||view.star.gal; html+=' вҖә <a data-l="galaxy">вңЁ '+g.name+'</a>'; }
  if(view.mode==='star'){ html+=' вҖә <span>вҳҖпёҸ '+view.star.display+'</span>'; }
  crumbs.innerHTML=html;
  crumbs.querySelectorAll('a').forEach(a=>a.onclick=()=>{
    if(a.dataset.l==='universe') view={mode:'universe'};
    else if(a.dataset.l==='galaxy') view={mode:'galaxy',galaxy:(view.galaxy||view.star.gal)};
    renderCrumbs();
  });
}

fetch('mock/data.json').then(r=>r.json()).then(d=>{ DATA=d; layout(); renderCrumbs(); draw(); })
  .catch(()=>{ /* file:// fetch blocked вҖ” inline fallback */
    DATA={galaxies:[{id:'demo',name:'Demo Galaxy',color:'#7c5cff',stars:[{handle:'you',display:'You',planets:['Open via a local server to see real mock data']}]}]};
    layout(); renderCrumbs(); draw();
  });
addEventListener('resize',()=>{ layout(); });
</script>
</body>
</html>
