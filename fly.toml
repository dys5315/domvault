# fly.toml app configuration file generated for domvault-registry on 2026-06-20T15:24:29-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'domvault-registry'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_REQUESTS = '1'
  PORT = '8080'
  RATE_LIMIT_PER_MIN = '120'
  STORE_DIR = '/data'

[[mounts]]
  source = 'reg_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    [http_service.http_options.response]

  [[http_service.checks]]
    interval = '30s'
    timeout = '3s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
